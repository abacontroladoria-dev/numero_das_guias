name: Bot Número das Guias

on:
  workflow_dispatch:
  schedule:
    - cron: '5 15 * * 1-5'
    - cron: '8 15 * * 1-5'
    - cron: '11 15 * * 1-5'
    - cron: '14 15 * * 1-5'
    - cron: '17 15 * * 1-5'
    - cron: '20 15 * * 1-5'
    - cron: '23 15 * * 1-5'
    - cron: '26 15 * * 1-5'
    - cron: '29 15 * * 1-5'
    - cron: '32 15 * * 1-5'
    - cron: '35 15 * * 1-5'

jobs:
  executar-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar apenas o Chromium
        run: npx playwright install chromium --with-deps

      - name: Executar bot
        env:
          USUARIO_ASSIM: ${{ secrets.USUARIO_ASSIM }}
          SENHA_ASSIM: ${{ secrets.SENHA_ASSIM }}
          ORBITA_URL: ${{ secrets.ORBITA_URL }}
          ORBITA_USER: ${{ secrets.ORBITA_USER }}
          ORBITA_PASS: ${{ secrets.ORBITA_PASS }}
          HEADLESS: true
        run: node src/main.js
